name: Release

# Builds release binaries for the homebrew-tap formula and publishes the crate.
# Triggered by pushing a version tag: git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]
  # Backfill path: re-run only the Homebrew formula update for an already
  # published release (e.g. when a release predates this job).
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to sync the Homebrew formula to (e.g. v0.2.0)"
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.asset }}
    if: github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            asset: shunt-darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-14
            asset: shunt-darwin-x64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            asset: shunt-linux-x64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
            asset: shunt-linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Stage asset
        run: cp target/${{ matrix.target }}/release/shunt ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: upload release assets
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: assets
          merge-multiple: true

      - name: Checksums
        run: cd assets && shasum -a 256 shunt-* > SHA256SUMS

      # The GitHub release itself is created by release-please when its
      # release PR merges; this attaches the binaries to it. A manually
      # pushed tag (no release-please release) still works via the fallback.
      - name: Upload assets
        run: |
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --generate-notes
          gh release upload "$TAG" assets/shunt-* assets/SHA256SUMS \
            --repo "$GITHUB_REPOSITORY" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}

  # Uses crates.io Trusted Publishing (OIDC) — no long-lived token secret.
  # The very first release of the crate must be published manually with an API
  # token (`cargo publish --token ...`); after that, link this repository and
  # workflow under the crate's Settings → Trusted Publishing on crates.io.
  publish-crate:
    name: publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Publish
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # Homebrew distribution: the binaries + SHA256SUMS are attached to the GitHub
  # release by the jobs above; this reads the published checksums and rewrites
  # shunt.rb in pleaseai/homebrew-tap (same GitHub App pattern as pleaseai/ask).
  # Keep the formula template below in sync with packaging/homebrew/shunt.rb.
  update-homebrew-formula:
    name: update Homebrew formula
    needs: release
    # Also runs on workflow_dispatch (backfill), where `release` is skipped.
    if: always() && (github.event_name == 'workflow_dispatch' || needs.release.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Mint tap token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          owner: pleaseai
          repositories: |
            shunt
            homebrew-tap

      - name: Checkout homebrew-tap
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: pleaseai/homebrew-tap
          token: ${{ steps.app-token.outputs.token }}
          path: homebrew-tap

      - name: Update formula
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          # Validate the tag before use so an untrusted dispatch input can't
          # inject shell into this step.
          [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]] || {
            echo "Unexpected release tag format: $TAG" >&2
            exit 1
          }
          VERSION="${TAG#v}"

          # Pull the published checksums straight from the release assets.
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern SHA256SUMS \
            --dir checksums \
            --clobber
          sha() { awk -v f="shunt-$1" '$NF == f {print $1}' checksums/SHA256SUMS; }
          DARWIN_ARM64_SHA256="$(sha darwin-arm64)"
          DARWIN_X64_SHA256="$(sha darwin-x64)"
          LINUX_ARM64_SHA256="$(sha linux-arm64)"
          LINUX_X64_SHA256="$(sha linux-x64)"

          cat > homebrew-tap/shunt.rb << 'FORMULA_EOF'
          class Shunt < Formula
            desc "Claude Code LLM gateway - Anthropic Messages proxy for OpenAI/Codex and compatible backends"
            homepage "https://github.com/pleaseai/shunt"
            version "VERSION_PLACEHOLDER"
            license "MIT OR Apache-2.0"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/pleaseai/shunt/releases/download/vVERSION_PLACEHOLDER/shunt-darwin-arm64"
                sha256 "SHA256_DARWIN_ARM64_PLACEHOLDER"
              else
                url "https://github.com/pleaseai/shunt/releases/download/vVERSION_PLACEHOLDER/shunt-darwin-x64"
                sha256 "SHA256_DARWIN_X64_PLACEHOLDER"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/pleaseai/shunt/releases/download/vVERSION_PLACEHOLDER/shunt-linux-arm64"
                sha256 "SHA256_LINUX_ARM64_PLACEHOLDER"
              else
                url "https://github.com/pleaseai/shunt/releases/download/vVERSION_PLACEHOLDER/shunt-linux-x64"
                sha256 "SHA256_LINUX_X64_PLACEHOLDER"
              end
            end

            def install
              if OS.mac?
                if Hardware::CPU.arm?
                  bin.install "shunt-darwin-arm64" => "shunt"
                else
                  bin.install "shunt-darwin-x64" => "shunt"
                end
              else
                if Hardware::CPU.arm?
                  bin.install "shunt-linux-arm64" => "shunt"
                else
                  bin.install "shunt-linux-x64" => "shunt"
                end
              end
            end

            test do
              assert_match "shunt", shell_output("#{bin}/shunt --help")
            end
          end
          FORMULA_EOF

          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" homebrew-tap/shunt.rb
          sed -i "s/SHA256_DARWIN_ARM64_PLACEHOLDER/${DARWIN_ARM64_SHA256}/" homebrew-tap/shunt.rb
          sed -i "s/SHA256_DARWIN_X64_PLACEHOLDER/${DARWIN_X64_SHA256}/" homebrew-tap/shunt.rb
          sed -i "s/SHA256_LINUX_ARM64_PLACEHOLDER/${LINUX_ARM64_SHA256}/" homebrew-tap/shunt.rb
          sed -i "s/SHA256_LINUX_X64_PLACEHOLDER/${LINUX_X64_SHA256}/" homebrew-tap/shunt.rb
          if grep -q PLACEHOLDER homebrew-tap/shunt.rb; then
            echo "Unfilled placeholder left in formula (missing checksum?)" >&2
            exit 1
          fi

          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- shunt.rb; then
            echo "No changes to shunt.rb"
            exit 0
          fi
          git add shunt.rb
          git commit -m "chore: update shunt to ${TAG}"
          git push origin HEAD
